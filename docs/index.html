<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunrise.app Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1f2937;--surface3:#273040;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
a{color:var(--blue);text-decoration:none;}a:hover{text-decoration:underline;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hlogo{display:flex;align-items:center;gap:12px;}
.hbadge{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.htitle h1{font-size:18px;font-weight:700;}
.htitle small{font-size:12px;color:var(--muted);}
.hstats{display:flex;gap:24px;align-items:center;}
.hstat{text-align:right;}
.hstat-val{font-size:18px;font-weight:700;}
.hstat-lbl{font-size:11px;color:var(--muted);}
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:13px;font-weight:500;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:currentColor;}
.tab .badge{display:inline-block;font-size:10px;background:var(--surface3);padding:1px 6px;border-radius:10px;margin-left:6px;color:var(--muted);}
.main{padding:20px 24px;max-width:1600px;margin:0 auto;}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:12px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;}
@media(max-width:1100px){.grid-6{grid-template-columns:repeat(3,1fr)}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.grid-2,.grid-3,.grid-4,.grid-6{grid-template-columns:1fr}}
.mb16{margin-bottom:16px;}.mb24{margin-bottom:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:14px;}
.kpi-val{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.5px;}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:5px;}
.kpi-chg{font-size:13px;font-weight:600;margin-top:4px;}
.pos{color:var(--green);}.neg{color:var(--red);}.neutral{color:var(--muted);}
.chart-wrap{position:relative;}
.chart-h200{height:200px;}.chart-h240{height:240px;}.chart-h280{height:280px;}.chart-h320{height:320px;}
.bar-row{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.bar-label{display:flex;justify-content:space-between;font-size:12px;}
.bar-label span:last-child{color:var(--muted);}
.bar-bg{height:7px;border-radius:4px;background:var(--surface3);overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.bars-scroll{max-height:300px;overflow-y:auto;padding-right:4px;}
.fund-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:border-color .2s,transform .15s;}
.fund-card:hover{border-color:var(--blue);transform:translateY(-1px);}
.fund-card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.fund-tag{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;}
.fund-name{font-weight:600;font-size:15px;}
.fund-isin{font-size:11px;color:var(--muted);font-family:monospace;}
.fund-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fund-kpi label{font-size:11px;color:var(--muted);}
.fund-kpi .val{font-size:18px;font-weight:700;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .1s;}
thead th:hover{color:var(--text);}
thead th.sort-asc::after{content:' ↑';}thead th.sort-desc::after{content:' ↓';}
th.r,td.r{text-align:right;}th.c,td.c{text-align:center;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);cursor:pointer;}
tbody td{padding:10px 12px;font-size:13px;vertical-align:middle;}
.td-name{font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-isin{font-size:11px;color:var(--muted);font-family:monospace;white-space:nowrap;}
.td-muted{color:var(--muted);font-size:12px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-mono{font-variant-numeric:tabular-nums;white-space:nowrap;}
.pl-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600;white-space:nowrap;}
.pl-pill.pos{background:#3fb95020;color:var(--green);}
.pl-pill.neg{background:#f8514920;color:var(--red);}
.pl-pill.neu{background:var(--surface3);color:var(--muted);}
.tbl-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
.tbl-toolbar h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:0;}
.tbl-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.search-in{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:13px;width:200px;outline:none;}
.search-in:focus{border-color:var(--blue);}
.search-in::placeholder{color:var(--muted);}
.filter-sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer;}
.btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text);font-size:12px;cursor:pointer;transition:background .1s;}
.btn:hover{background:var(--surface3);}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
.page-info{font-size:12px;color:var(--muted);}
.page-btns{display:flex;gap:6px;}
.mover-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.mover-row:last-child{border-bottom:none;}
.mover-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mover-country{font-size:11px;color:var(--muted);}
.mover-val{font-size:13px;font-weight:600;text-align:right;min-width:90px;}
.conc-meter{margin-bottom:12px;}
.conc-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.conc-track{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;}
.conc-fill{height:100%;border-radius:4px;}
.modal-bg{display:none;position:fixed;inset:0;background:#00000088;z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:700;}
.modal-subtitle{font-size:12px;color:var(--muted);margin-top:4px;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px 24px;}
.modal-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.modal-kpi{background:var(--surface2);border-radius:8px;padding:12px;}
.modal-kpi label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;}
.modal-kpi .val{font-size:16px;font-weight:700;}
.modal-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.ext-link{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--text);transition:border-color .15s;}
.ext-link:hover{border-color:var(--blue);text-decoration:none;}
.modal-divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.modal-pl-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pl-box{background:var(--surface2);border-radius:8px;padding:12px;}
.pl-box label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;}
.pl-box .val{font-size:18px;font-weight:700;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

/* CHANGES SECTION */
.changes-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
@media(max-width:900px){.changes-grid{grid-template-columns:1fr}}
.change-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.change-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.change-card-header h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:0;}
.change-card-body{padding:0;}
.change-placeholder{padding:32px 20px;text-align:center;}
.change-placeholder .icon{font-size:32px;margin-bottom:10px;}
.change-placeholder p{color:var(--muted);font-size:13px;line-height:1.6;}
.change-placeholder strong{color:var(--text);}
.change-row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border);}
.change-row:last-child{border-bottom:none;}
.change-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.change-info{flex:1;min-width:0;}
.change-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.change-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.change-right{text-align:right;flex-shrink:0;}
.change-price{font-size:13px;font-weight:600;}
.change-pct{font-size:11px;color:var(--muted);}
.qty-change{display:flex;align-items:center;gap:6px;font-size:12px;}
.qty-arrow{color:var(--muted);}
.changes-summary-bar{display:flex;gap:16px;padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:12px;}
.sum-item{display:flex;align-items:center;gap:6px;}
.sum-dot{width:6px;height:6px;border-radius:50%;}

/* ── TOOLTIP SYSTEM ── */
.tip{border-bottom:1px dashed var(--muted);cursor:help;position:relative;display:inline}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1d2e;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);white-space:normal;min-width:220px;max-width:300px;line-height:1.5;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;box-shadow:0 4px 20px #00000066}
.tip:hover::after{opacity:1}

/* ── CALCULATOR TAB ── */
.calc-input-row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:24px;}
.calc-input-group{display:flex;flex-direction:column;gap:6px;}
.calc-input-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.calc-number{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:18px;font-weight:700;width:200px;outline:none;}
.calc-number:focus{border-color:var(--blue);}
.calc-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;cursor:pointer;min-width:220px;}
.calc-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
@media(max-width:900px){.calc-cards{grid-template-columns:1fr}}
.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.calc-card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.calc-fund-tag{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;}
.calc-fund-name{font-weight:600;font-size:14px;}
.calc-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);}
.calc-row:last-child{border-bottom:none;}
.calc-label{font-size:12px;color:var(--muted);}
.calc-value{font-size:14px;font-weight:600;}
.calc-big{font-size:20px!important;margin-top:4px;}
.sparkline-note{font-size:11px;color:var(--muted);margin-top:10px;text-align:center;}
</style>
</head>

<script>
const FUND_ORDER=["3411","3431","3581"];
let currentTab="overview",sortCol="mv",sortDir=-1,holdingsPage=1,searchQ="",filterCountry="",filterSector="";
const PAGE=25;

FUND_ORDER.forEach(fid=>{
  const f=DATA.funds[fid];
  f.top10_weight=f.holdings.slice(0,10).reduce((s,h)=>s+h.pct,0);
  f.hhi=f.holdings.reduce((s,h)=>s+(h.pct/100)*(h.pct/100),0)*10000;
  f.total_pl=f.holdings.reduce((s,h)=>s+h.pl,0);
  f.pos_pl=f.holdings.filter(h=>h.pl>0).reduce((s,h)=>s+h.pl,0);
  f.neg_pl=f.holdings.filter(h=>h.pl<0).reduce((s,h)=>s+h.pl,0);
});
const TOTAL_AUM=FUND_ORDER.reduce((s,fid)=>s+DATA.funds[fid].nav,0);

function fmt(n,d=2){if(n==null)return'—';return new Intl.NumberFormat('de-AT',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);}
function fmtM(n){if(n==null)return'—';const a=Math.abs(n);if(a>=1e9)return fmt(n/1e9,2)+' Mrd';if(a>=1e6)return fmt(n/1e6,2)+' Mio';if(a>=1e3)return fmt(n/1e3,1)+' T';return fmt(n,0);}
function sign(n){return n>0?'+':'';}
function cls(n){return n>0?'pos':n<0?'neg':'neutral';}
function pilClass(n){return n>0?'pos':n<0?'neg':'neu';}

function renderHeader(){
  const el=document.getElementById('h-stats');
  const totalPl=FUND_ORDER.reduce((s,fid)=>s+DATA.funds[fid].total_pl,0);
  const avgYtd=FUND_ORDER.reduce((s,fid)=>s+DATA.funds[fid].perf_ytd,0)/3;
  if(currentTab==='overview'){document.getElementById('h-badge').textContent='IQ';document.getElementById('h-badge').style.background='#1a56db';}
  else{const f=DATA.funds[currentTab];document.getElementById('h-badge').textContent=f.id;document.getElementById('h-badge').style.background=f.color;}
  el.innerHTML=`<div class="hstat"><div class="hstat-val">EUR ${fmtM(TOTAL_AUM)}</div><div class="hstat-lbl">Gesamt AuM</div></div>
    <div class="hstat"><div class="hstat-val ${cls(totalPl)}">${sign(totalPl)}EUR ${fmtM(totalPl)}</div><div class="hstat-lbl">Unrealisiertes P&L gesamt</div></div>
    <div class="hstat"><div class="hstat-val ${cls(avgYtd)}">${sign(avgYtd)}${fmt(avgYtd)}%</div><div class="hstat-lbl">Ø Performance YTD</div></div>`;
}

function buildTabs(){
  const nav=document.getElementById('tabs');
  const ovA=currentTab==='overview';
  let html=`<div class="tab ${ovA?'active':''}" style="${ovA?'color:#58a6ff;border-bottom-color:#58a6ff':''}" onclick="switchTab('overview')">📊 Übersicht</div>`;
  FUND_ORDER.forEach(fid=>{
    const f=DATA.funds[fid],active=currentTab===fid;
    const chg=f.nav_per_share-f.nav_per_share_prev;
    const ch=f.changes;
    const totalChanges=(ch.added?.length||0)+(ch.removed?.length||0)+(ch.increased?.length||0)+(ch.decreased?.length||0);
    const badge=totalChanges>0?`<span class="badge" style="background:#d2992233;color:var(--yellow)">${totalChanges} Änd.</span>`:'';
    html+=`<div class="tab ${active?'active':''}" style="${active?'color:'+f.color+';border-bottom-color:'+f.color:''}" onclick="switchTab('${fid}')">
      ${fid} – ${f.name}<span class="badge ${cls(chg)}">${sign(chg)}${fmt(chg,2)}</span>${badge}</div>`;
  });
  html+=`<div class="tab ${currentTab==='rechner'?'active':''}" style="${currentTab==='rechner'?'color:#bc8cff;border-bottom-color:#bc8cff':''}" onclick="switchTab('rechner')">🧮 Rechner</div>`;
  nav.innerHTML=html;
}

function switchTab(t){currentTab=t;sortCol='mv';sortDir=-1;holdingsPage=1;searchQ='';filterCountry='';filterSector='';buildTabs();renderHeader();render();}
function render(){if(currentTab==='overview')renderOverview(document.getElementById('app'));else if(currentTab==='rechner')renderRechner(document.getElementById('app'));else renderFund(DATA.funds[currentTab],document.getElementById('app'));}

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function renderOverview(app){
  app.innerHTML=`
    <div class="grid-3 mb24" id="ov-cards"></div>
    <div class="grid-2 mb24">
      <div class="card"><h3>Performance-Vergleich</h3><div class="chart-wrap chart-h240"><canvas id="ov-perf"></canvas></div></div>
      <div class="card"><h3>AuM-Verteilung</h3><div class="chart-wrap chart-h240"><canvas id="ov-aum"></canvas></div></div>
    </div>
    <div class="card mb24"><div class="tbl-toolbar"><h3>Gemeinsame Holdings (≥2 Fonds)</h3></div><div id="ov-common"></div></div>`;

  document.getElementById('ov-cards').innerHTML=FUND_ORDER.map(fid=>{
    const f=DATA.funds[fid],chg=f.nav_per_share-f.nav_per_share_prev,chgP=chg/f.nav_per_share_prev*100;
    return `<div class="fund-card" onclick="switchTab('${fid}')">
      <div class="fund-card-header"><div class="fund-tag" style="background:${f.color}">${f.id}</div>
      <div><div class="fund-name">${f.name}</div><div class="fund-isin">${f.isin}</div></div></div>
      <div class="fund-kpi-row">
        <div class="fund-kpi"><label><span class="tip" data-tip="Net Asset Value – Gesamtwert aller Fondsassets abzüglich Verbindlichkeiten.">NAV</span></label><div class="val" style="font-size:16px">EUR ${fmtM(f.nav)}</div></div>
        <div class="fund-kpi"><label>Anteilspreis</label><div class="val" style="font-size:16px">EUR ${fmt(f.nav_per_share)}</div></div>
        <div class="fund-kpi"><label><span class="tip" data-tip="Veränderung des Anteilspreises seit dem Vortag, absolut und in Prozent.">Tagesveränd.</span></label><div class="val ${cls(chg)}" style="font-size:15px">${sign(chg)}${fmt(chg,2)} (${sign(chgP)}${fmt(chgP,2)}%)</div></div>
        <div class="fund-kpi"><label><span class="tip" data-tip="Year-to-Date – Wertentwicklung seit 01.01.2026.">YTD</span></label><div class="val ${cls(f.perf_ytd)}" style="font-size:16px">${sign(f.perf_ytd)}${fmt(f.perf_ytd,2)}%</div></div>
        <div class="fund-kpi"><label>P&L unrealisiert</label><div class="val ${cls(f.total_pl)}" style="font-size:14px">${sign(f.total_pl)}EUR ${fmtM(f.total_pl)}</div></div>
        <div class="fund-kpi"><label>Positionen</label><div class="val" style="font-size:16px">${f.holdings.length}</div></div>
      </div></div>`;
  }).join('');

  new Chart(document.getElementById('ov-perf'),{type:'bar',data:{labels:FUND_ORDER.map(fid=>DATA.funds[fid].name.split(' ').slice(-1)[0]),
    datasets:[{label:'YTD %',data:FUND_ORDER.map(fid=>DATA.funds[fid].perf_ytd),backgroundColor:FUND_ORDER.map(fid=>DATA.funds[fid].color+'bb'),borderRadius:6},
    {label:'Geschäftsjahr %',data:FUND_ORDER.map(fid=>DATA.funds[fid].perf_fy),backgroundColor:FUND_ORDER.map(fid=>DATA.funds[fid].color+'44'),borderRadius:6,borderWidth:1,borderColor:FUND_ORDER.map(fid=>DATA.funds[fid].color)}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b949e',font:{size:11}}}},scales:{x:{ticks:{color:'#8b949e'},grid:{color:'#30363d'}},y:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'#30363d'}}}}});

  new Chart(document.getElementById('ov-aum'),{type:'doughnut',data:{labels:FUND_ORDER.map(fid=>`${DATA.funds[fid].id} – ${DATA.funds[fid].name}`),
    datasets:[{data:FUND_ORDER.map(fid=>DATA.funds[fid].nav),backgroundColor:FUND_ORDER.map(fid=>DATA.funds[fid].color),borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:'#8b949e',font:{size:11},padding:10,boxWidth:12}},
    tooltip:{callbacks:{label:ctx=>` EUR ${fmtM(ctx.parsed)} (${fmt(ctx.parsed/TOTAL_AUM*100,1)}%)`}}}}});

  const isinFunds={};
  FUND_ORDER.forEach(fid=>DATA.funds[fid].holdings.forEach(h=>{if(!isinFunds[h.isin])isinFunds[h.isin]=[];isinFunds[h.isin].push({fid,h});}));
  const common=Object.entries(isinFunds).filter(([,v])=>v.length>=2).sort((a,b)=>b[1].reduce((s,x)=>s+x.h.mv,0)-a[1].reduce((s,x)=>s+x.h.mv,0)).slice(0,20);
  document.getElementById('ov-common').innerHTML=`<div class="tbl-wrap"><table><thead><tr><th>Titel</th><th>ISIN</th><th>Land</th>
    ${FUND_ORDER.map(fid=>`<th class="r">${DATA.funds[fid].name.split(' ').slice(-1)[0]} MV</th><th class="r">%</th>`).join('')}
    <th class="r">Gesamt MV</th></tr></thead><tbody>
    ${common.map(([isin,entries])=>{const first=entries[0].h,fm={};entries.forEach(e=>fm[e.fid]=e.h);const tot=entries.reduce((s,e)=>s+e.h.mv,0);
      return `<tr><td class="td-name">${first.name}</td><td class="td-isin">${isin}</td><td class="td-muted">${first.country||'—'}</td>
      ${FUND_ORDER.map(fid=>{const e=fm[fid];return e?`<td class="r td-mono">${fmtM(e.mv)}</td><td class="r td-mono">${fmt(e.pct,2)}%</td>`:'<td class="r neutral">—</td><td class="r neutral">—</td>';}).join('')}
      <td class="r td-mono" style="font-weight:600">EUR ${fmtM(tot)}</td></tr>`;}).join('')}
    </tbody></table></div><p style="margin-top:10px;font-size:12px;color:var(--muted)">${common.length} gemeinsame Positionen in ≥2 Fonds</p>`;
}

// ── FUND TAB ──────────────────────────────────────────────────────────────────
function renderFund(f,app){
  const chg=f.nav_per_share-f.nav_per_share_prev,chgP=chg/f.nav_per_share_prev*100;
  const countries=[...new Set(f.holdings.map(h=>h.country).filter(Boolean))].sort();
  const sectors=[...new Set(f.holdings.map(h=>h.sector).filter(Boolean))].sort();
  app.innerHTML=`
    <div class="grid-6 mb24">
      <div class="card-sm"><div class="section-title"><span class="tip" data-tip="Net Asset Value – Gesamtwert aller Fondsassets abzüglich Verbindlichkeiten.">Fondsvermögen</span></div><div class="kpi-val" style="font-size:22px">EUR ${fmtM(f.nav)}</div>${f.nav_prev?`<div class="kpi-sub">Vortag: EUR ${fmtM(f.nav_prev)}</div>`:''}</div>

      <div class="card-sm"><div class="section-title">Anteile im Umlauf</div><div class="kpi-val" style="font-size:20px">${f.shares?fmt(f.shares,3):'—'}</div>${f.shares_prev?`<div class="kpi-sub">Vortag: ${fmt(f.shares_prev,3)}</div>`:''}</div>
      <div class="card-sm"><div class="section-title"><span class="tip" data-tip="Year-to-Date – Wertentwicklung seit 01.01.2026.">YTD (ab 01.01.2026)</span></div><div class="kpi-val ${cls(f.perf_ytd)}">${sign(f.perf_ytd)}${fmt(f.perf_ytd,2)}%</div></div>
      <div class="card-sm"><div class="section-title"><span class="tip" data-tip="Performance seit Beginn des Geschäftsjahres am 01.10.2025.">Geschäftsjahr (ab 01.10.25)</span></div><div class="kpi-val ${cls(f.perf_fy)}">${sign(f.perf_fy)}${fmt(f.perf_fy,2)}%</div></div>
      <div class="card-sm"><div class="section-title"><span class="tip" data-tip="Unrealisierter Gewinn/Verlust – Buchgewinn der noch nicht durch Verkauf realisiert wurde.">Unrealisiertes P&amp;L</span></div><div class="kpi-val ${cls(f.total_pl)}" style="font-size:20px">${sign(f.total_pl)}EUR ${fmtM(f.total_pl)}</div><div class="kpi-sub">${f.holdings.filter(h=>h.pl>0).length} Gew. / ${f.holdings.filter(h=>h.pl<0).length} Verl.</div></div>
    </div>

    <!-- NAV SPARKLINE -->
    <div class="card mb24" id="sparkline-card"><h3>NAV-Kursverlauf (Ankerpunkte)</h3><div class="chart-wrap" style="height:160px"><canvas id="sparkline-chart"></canvas></div><div class="sparkline-note">📌 Ankerpunkte aus BVI-Performancedaten berechnet. Ab morgen tägliche Aktualisierung automatisch.</div></div>

    <!-- CHANGES SECTION -->
    <div id="changes-section" class="mb24"></div>

    <div class="grid-3 mb24">
      <div class="card"><h3>Top 10 Gewinner (EUR)</h3><div id="top-gainers"></div></div>

        <tbody id="h-body"></tbody>
      </table></div>
      <div class="pagination"><div class="page-info" id="p-info"></div>
        <div class="page-btns"><button class="btn" id="p-prev" onclick="changePage(-1)">← Zurück</button><button class="btn" id="p-next" onclick="changePage(1)">Weiter →</button></div>
      </div>
    </div>`;

  renderChanges(f);
  renderSparkline(f);
  renderTopMovers(f);
  renderConcentration(f);
  renderCountryBars(f);
  renderCcyChart(f);
  renderSectorTypeChart(f);
  renderPLCountry(f);
  renderPLSector(f);
  renderHoldingsTable(f);
}

// ── CHANGES ───────────────────────────────────────────────────────────────────
function renderChanges(f) {
  const el = document.getElementById('changes-section');
  const ch = f.changes || {};
  const added = ch.added || [];
  const removed = ch.removed || [];
  const increased = ch.increased || [];
  const decreased = ch.decreased || [];
  const datePrev = ch.date_prev;
  const hasData = added.length || removed.length || increased.length || decreased.length;

  const placeholder = `<div class="change-placeholder">
    <div class="icon">📅</div>
    <p><strong>Noch keine Vergleichsdaten verfügbar</strong><br>
    Dieser Bereich zeigt täglich alle Änderungen im Portfolio —<br>
    neu eingekaufte Titel, verkaufte Positionen und Aufstockungen.<br>
    <span style="color:var(--blue)">Ab morgen wird er automatisch befüllt.</span></p>
  </div>`;

  function changeRow(item, type) {
    const dotColor = type==='added'?'var(--green)':type==='removed'?'var(--red)':type==='increased'?'var(--blue)':'var(--yellow)';
    const icon = type==='added'?'↑ Neu':type==='removed'?'↓ Verkauft':type==='increased'?'▲ Aufgestockt':'▼ Reduziert';
    let rightHtml = '';
    if (type==='added') {
      rightHtml=`<div class="change-price pos">+ EUR ${fmtM(item.mv)}</div><div class="change-pct">${fmt(item.pct,2)}% NAV · ${fmt(item.price,4)} ${item.ccy||'EUR'}</div>`;
    } else if (type==='removed') {
      const plCls = (item.pl||0)>=0?'pos':'neg';
      rightHtml=`<div class="change-price ${plCls}">${sign(item.pl||0)}EUR ${fmtM(item.pl||0)} P&L</div><div class="change-pct">Letzter Kurs: ${fmt(item.last_price,4)} ${item.ccy||'EUR'}</div>`;
    } else {
      const diff = (item.qty_now||0)-(item.qty_prev||0);
      rightHtml=`<div class="qty-change"><span>${fmt(item.qty_prev,0)}</span><span class="qty-arrow">→</span><span style="font-weight:600">${fmt(item.qty_now,0)}</span><span class="${diff>0?'pos':'neg'}" style="font-size:11px">(${sign(diff)}${fmt(diff,0)})</span></div><div class="change-pct">EUR ${fmtM(item.mv)}</div>`;
    }
    return `<div class="change-row">
      <div class="change-dot" style="background:${dotColor}"></div>
      <div class="change-info">
        <div class="change-name" title="${item.name}">${item.name}</div>
        <div class="change-meta">${item.isin} · ${item.country||'—'} · <span style="font-size:10px;padding:1px 5px;border-radius:4px;background:${dotColor}22;color:${dotColor}">${icon}</span></div>
      </div>
      <div class="change-right">${rightHtml}</div>
    </div>`;
  }

  const summaryBar = hasData ? `<div class="changes-summary-bar">
    ${datePrev?`<span style="color:var(--muted)">Vergleich zu ${datePrev}</span>  ·  `:''}
    <div class="sum-item"><div class="sum-dot" style="background:var(--green)"></div><span class="pos">${added.length} Neu</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:var(--red)"></div><span class="neg">${removed.length} Verkauft</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:var(--blue)"></div><span>${increased.length} Aufgestockt</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:var(--yellow)"></div><span>${decreased.length} Reduziert</span></div>
  </div>` : '';

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">Portfolio-Veränderungen ${datePrev?`(vs. ${datePrev})`:'— wird täglich aktualisiert'}</div>
      ${hasData?`<span style="font-size:11px;color:var(--muted)">${added.length+removed.length+increased.length+decreased.length} Änderungen gesamt</span>`:''}
    </div>
    <div class="changes-grid">
      <div class="change-card">
        <div class="change-card-header"><h3 style="color:var(--green)">✦ Neu eingekauft</h3>${hasData&&added.length?`<span style="font-size:11px;color:var(--muted)">${added.length} Titel</span>`:''}</div>
        <div class="change-card-body">${added.length ? added.map(i=>changeRow(i,'added')).join('') : placeholder}</div>
      </div>
      <div class="change-card">
        <div class="change-card-header"><h3 style="color:var(--red)">✦ Verkauft / Abgang</h3>${hasData&&removed.length?`<span style="font-size:11px;color:var(--muted)">${removed.length} Titel</span>`:''}</div>
        <div class="change-card-body">${removed.length ? removed.map(i=>changeRow(i,'removed')).join('') : placeholder}</div>
      </div>
      <div class="change-card">
        <div class="change-card-header"><h3 style="color:var(--blue)">▲ Aufgestockt</h3>${hasData&&increased.length?`<span style="font-size:11px;color:var(--muted)">${increased.length} Positionen</span>`:''}</div>
        <div class="change-card-body">${increased.length ? increased.map(i=>changeRow(i,'increased')).join('') : placeholder}</div>
      </div>
      <div class="change-card">
        <div class="change-card-header"><h3 style="color:var(--yellow)">▼ Reduziert</h3>${hasData&&decreased.length?`<span style="font-size:11px;color:var(--muted)">${decreased.length} Positionen</span>`:''}</div>
        <div class="change-card-body">${decreased.length ? decreased.map(i=>changeRow(i,'decreased')).join('') : placeholder}</div>
      </div>
    </div>`;
}

// ── TOP MOVERS ────────────────────────────────────────────────────────────────
function renderTopMovers(f){
  const sorted=[...f.holdings].sort((a,b)=>b.pl-a.pl);
  function rows(list,c){return list.map(h=>{const p=h.buy_price?(h.price-h.buy_price)/h.buy_price*100:null;
    return `<div class="mover-row"><div><div class="mover-name" title="${h.name}">${h.name}</div><div class="mover-country">${h.country||''} · ${h.ccy||''}</div></div>
    <div class="mover-val ${c}">${sign(h.pl)}EUR ${fmtM(h.pl)}${p!=null?`<br><span style="font-size:10px;opacity:.7">${sign(p)}${fmt(p,1)}%</span>`:''}</div></div>`;}).join('');}
  document.getElementById('top-gainers').innerHTML=rows(sorted.filter(h=>h.pl>0).slice(0,10),'pos');
  document.getElementById('top-losers').innerHTML=rows(sorted.filter(h=>h.pl<0).slice(-10).reverse(),'neg');
}

function renderConcentration(f){
  const top5=f.holdings.slice(0,5).reduce((s,h)=>s+h.pct,0);
  const top10=f.holdings.slice(0,10).reduce((s,h)=>s+h.pct,0);
  const top20=f.holdings.slice(0,20).reduce((s,h)=>s+h.pct,0);
  const hhi=f.hhi;
  const winR=f.holdings.filter(h=>h.pl>0).length/f.holdings.length*100;
  document.getElementById('concentration').innerHTML=`
    <div class="conc-meter"><div class="conc-label"><span>Top 5</span><span style="font-weight:600">${fmt(top5,1)}%</span></div>
    <div class="conc-track"><div class="conc-fill" style="width:${Math.min(top5,100)}%;background:${top5>30?'var(--red)':top5>20?'var(--yellow)':'var(--blue)'}"></div></div></div>
    <div class="conc-meter"><div class="conc-label"><span>Top 10</span><span style="font-weight:600">${fmt(top10,1)}%</span></div>
    <div class="conc-track"><div class="conc-fill" style="width:${Math.min(top10,100)}%;background:var(--blue)"></div></div></div>
    <div class="conc-meter"><div class="conc-label"><span>Top 20</span><span style="font-weight:600">${fmt(top20,1)}%</span></div>
    <div class="conc-track"><div class="conc-fill" style="width:${Math.min(top20,100)}%;background:var(--purple)"></div></div></div>
    <hr class="divider" style="margin:14px 0">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="card-sm" style="padding:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px"><span class="tip" data-tip="Herfindahl-Hirschman-Index: Konzentrationsmaß. &lt; 100 = breit diversifiziert, 100–250 = mittel, &gt; 250 = konzentriert.">HHI-Index</span></div>
        <div style="font-size:18px;font-weight:700">${fmt(hhi,1)}</div>
        <div style="font-size:11px;color:var(--muted)">${hhi<100?'Breit diversifiziert':hhi<250?'Mittel':' Konzentriert'}</div></div>
      <div class="card-sm" style="padding:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px"><span class="tip" data-tip="Anteil der Positionen mit unrealisiertem Gewinn an allen Positionen.">Win-Rate</span></div>
        <div style="font-size:18px;font-weight:700" class="${cls(winR-50)}">${fmt(winR,1)}%</div>
        <div style="font-size:11px;color:var(--muted)">${f.holdings.filter(h=>h.pl>0).length} Gew. / ${f.holdings.filter(h=>h.pl<0).length} Verl.</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="card-sm" style="padding:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">P&L Gewinner</div><div style="font-size:15px;font-weight:700" class="pos">+EUR ${fmtM(f.pos_pl)}</div></div>
      <div class="card-sm" style="padding:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">P&L Verlierer</div><div style="font-size:15px;font-weight:700" class="neg">EUR ${fmtM(f.neg_pl)}</div></div>
    </div>`;
}

function renderCountryBars(f){
  const top=f.countries.slice(0,15),maxMv=top[0]?.mv||1,color=DATA.funds[currentTab]?.color||'#58a6ff';
  document.getElementById('country-bars').innerHTML=top.map(c=>{
    const pct=c.mv/f.nav*100,w=Math.round(c.mv/maxMv*100);
    return `<div class="bar-row"><div class="bar-label"><span>${c.name}</span><span>${fmt(pct,1)}% · EUR ${fmtM(c.mv)}</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${w}%;background:${color}"></div></div></div>`;}).join('');
}

let ccyChart=null,secTypeChart=null,plCChart=null,plSChart=null;
function renderCcyChart(f){
  if(ccyChart){ccyChart.destroy();ccyChart=null;}
  const ctx=document.getElementById('ccy-chart');
  const d=f.currencies.slice(0,8);
  const colors=['#58a6ff','#3fb950','#d29922','#bc8cff','#f85149','#39d353','#e3b341','#0366d6'];
  ccyChart=new Chart(ctx,{type:'doughnut',data:{labels:d.map(c=>c.name),datasets:[{data:d.map(c=>c.mv),backgroundColor:colors,borderWidth:0,hoverOffset:5}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{color:'#8b949e',font:{size:11},padding:8,boxWidth:10}},
    tooltip:{callbacks:{label:ctx=>` ${ctx.label}: EUR ${fmtM(ctx.parsed)} (${fmt(ctx.parsed/f.nav*100,1)}%)`}}}}});
}

function renderSectorTypeChart(f){
  if(secTypeChart){secTypeChart.destroy();secTypeChart=null;}
  const ctx=document.getElementById('sector-chart');
  const d=[...f.sectors].sort((a,b)=>b.mv-a.mv);
  const color=DATA.funds[currentTab]?.color||'#58a6ff';
  secTypeChart=new Chart(ctx,{type:'bar',data:{labels:d.map(s=>s.name.length>20?s.name.slice(0,20)+'…':s.name),datasets:[{data:d.map(s=>s.pct),backgroundColor:color+'99',borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.parsed,2)}% NAV · EUR ${fmtM(d[ctx.dataIndex].mv)}`}}},
    scales:{x:{grid:{color:'#30363d'},ticks:{color:'#8b949e',callback:v=>v+'%'}},y:{grid:{display:false},ticks:{color:'#e6edf3',font:{size:11}}}}}});
}

function renderPLCountry(f){
  if(plCChart){plCChart.destroy();plCChart=null;}
  const ctx=document.getElementById('pl-country-chart');
  const byC={};f.holdings.forEach(h=>{if(h.country)byC[h.country]=(byC[h.country]||0)+h.pl;});
  const sorted=Object.entries(byC).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).slice(0,12);
  const vals=sorted.map(([,v])=>v);
  plCChart=new Chart(ctx,{type:'bar',data:{labels:sorted.map(([c])=>c),datasets:[{data:vals,backgroundColor:vals.map(v=>v>0?'#3fb95099':'#f8514999'),borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${sign(ctx.parsed)}EUR ${fmtM(ctx.parsed)}`}}},
    scales:{x:{grid:{color:'#30363d'},ticks:{color:'#8b949e',callback:v=>sign(v)+fmtM(v)}},y:{grid:{display:false},ticks:{color:'#e6edf3',font:{size:11}}}}}});
}

function renderPLSector(f){
  if(plSChart){plSChart.destroy();plSChart=null;}
  const ctx=document.getElementById('pl-sector-chart');
  const byS={};f.holdings.forEach(h=>{if(h.sector)byS[h.sector]=(byS[h.sector]||0)+h.pl;});
  const sorted=Object.entries(byS).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).slice(0,12);
  const vals=sorted.map(([,v])=>v);
  plSChart=new Chart(ctx,{type:'bar',data:{labels:sorted.map(([s])=>s.length>22?s.slice(0,22)+'…':s),datasets:[{data:vals,backgroundColor:vals.map(v=>v>0?'#3fb95099':'#f8514999'),borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${sign(ctx.parsed)}EUR ${fmtM(ctx.parsed)}`}}},
    scales:{x:{grid:{color:'#30363d'},ticks:{color:'#8b949e',callback:v=>sign(v)+fmtM(v)}},y:{grid:{display:false},ticks:{color:'#e6edf3',font:{size:11}}}}}});
}

function getFiltered(f){
  let h=[...f.holdings].map(x=>({...x,pl_pct:x.buy_price?(x.price-x.buy_price)/x.buy_price*100:0}));
  if(searchQ){const q=searchQ.toLowerCase();h=h.filter(r=>r.name.toLowerCase().includes(q)||r.isin.toLowerCase().includes(q)||(r.country||'').toLowerCase().includes(q)||(r.sector||'').toLowerCase().includes(q));}
  if(filterCountry)h=h.filter(r=>r.country===filterCountry);
  if(filterSector)h=h.filter(r=>r.sector===filterSector);
  return h.sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];return typeof va==='string'?sortDir*va.localeCompare(vb):sortDir*((va||0)-(vb||0));});
}

function renderHoldingsTable(f){
  const rows=getFiltered(f),total=rows.length,start=(holdingsPage-1)*PAGE,page=rows.slice(start,start+PAGE);
  const tbody=document.getElementById('h-body');if(!tbody)return;
  tbody.innerHTML=page.map(h=>{const plCls=pilClass(h.pl);
    return `<tr onclick="openModal(${JSON.stringify(currentTab)},${JSON.stringify(h.isin)})">
      <td class="td-name" title="${h.name}">${h.name}</td><td class="td-isin">${h.isin}</td>
      <td>${h.country||'—'}</td><td class="td-muted" title="${h.sector}">${h.sector||'—'}</td>
      <td class="r">${h.ccy||'EUR'}</td><td class="r td-mono">${h.qty?fmt(h.qty,0):'—'}</td>
      <td class="r td-mono">${fmt(h.price,4)}</td><td class="r td-mono" style="font-weight:600">${fmt(h.mv)}</td>
      <td class="r td-mono">${fmt(h.pct,2)}%</td>
      <td class="r"><span class="pl-pill ${plCls}">${sign(h.pl)}EUR ${fmtM(h.pl)}</span></td>
      <td class="r td-mono ${cls(h.pl_pct)}">${sign(h.pl_pct)}${fmt(h.pl_pct,1)}%</td>
    </tr>`;}).join('');
  const cols=['name','isin','country','sector','ccy','qty','price','mv','pct','pl','pl_pct'];
  document.querySelectorAll('#h-table thead th').forEach((th,i)=>{th.classList.remove('sort-asc','sort-desc');if(cols[i]===sortCol)th.classList.add(sortDir>0?'sort-asc':'sort-desc');});
  document.getElementById('h-count').textContent=`(${total} Ergebnisse)`;
  document.getElementById('p-info').textContent=`${Math.min(start+1,total)}–${Math.min(start+PAGE,total)} von ${total}`;
  document.getElementById('p-prev').disabled=holdingsPage<=1;
  document.getElementById('p-next').disabled=start+PAGE>=total;
}

function changePage(d){holdingsPage+=d;renderHoldingsTable(DATA.funds[currentTab]);}
function doSort(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}holdingsPage=1;renderHoldingsTable(DATA.funds[currentTab]);}
function onSearch(v){searchQ=v;holdingsPage=1;renderHoldingsTable(DATA.funds[currentTab]);}
function onFilter(){filterCountry=document.getElementById('f-country').value;filterSector=document.getElementById('f-sector').value;holdingsPage=1;renderHoldingsTable(DATA.funds[currentTab]);}

function exportCsv(){
  const f=DATA.funds[currentTab],rows=getFiltered(f);
  const blob=new Blob(['ISIN,Name,Land,Branche,Waehrung,Stueckzahl,Kurs,Marktwert_EUR,Pct_NAV,PL_EUR,PL_Pct\n'+
    rows.map(h=>[h.isin,'"'+h.name+'"',h.country,'"'+(h.sector||'')+'"',h.ccy,h.qty,h.price,h.mv,h.pct,h.pl,h.pl_pct].join(',')).join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`IQAM_${f.id}_${DATA.date.replace(/\./g,'-')}.csv`;a.click();
}

function closeModal(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});


// ── SPARKLINE ─────────────────────────────────────────────────────────────────
function renderSparkline(f){
  const ph=f.price_history||[];
  if(!ph.length)return;
  const ctx=document.getElementById('sparkline-chart');
  if(!ctx)return;
  // Destroy existing chart if any
  const existing=Chart.getChart(ctx);
  if(existing)existing.destroy();
  new Chart(ctx,{
    type:'line',
    data:{
      labels:ph.map(p=>p.label),
      datasets:[{
        label:f.name,
        data:ph.map(p=>p.price),
        borderColor:f.color,
        backgroundColor:'transparent',
        tension:0.3,
        pointRadius:5,
        pointBackgroundColor:f.color,
        pointBorderColor:'#1a1d2e',
        pointBorderWidth:2,
        fill:false,
        borderWidth:2
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:ctx=>'EUR '+fmt(ctx.parsed.y,2),
            afterLabel:(ctx)=>{const pt=ph[ctx.dataIndex];return pt.note||'';}
          }
        }
      },
      scales:{
        x:{grid:{color:'#30363d33'},ticks:{color:'#8b949e',font:{size:11}}},
        y:{grid:{color:'#30363d33'},ticks:{color:'#8b949e',font:{size:11},callback:v=>''+fmt(v,2)}}
      }
    }
  });
}

// ── PERFORMANCE CALCULATOR ────────────────────────────────────────────────────
const PERIODS=[
  {key:'ytd',label:'YTD (ab 01.01.2026)',dateStart:'2026-01-01'},
  {key:'fy', label:'Geschäftsjahr (ab 01.10.2025)',dateStart:'2025-10-01'},
  {key:'day',label:'Gestern → Heute',dateStart:'2026-06-16'}
];
let calcAmount=10000,calcPeriod='ytd';
let calcChartInst=null;

function renderRechner(app){
  app.innerHTML=`
    <div class="card mb24">
      <h3>Performance-Rechner</h3>
      <div class="calc-input-row">
        <div class="calc-input-group">
          <label>Investierter Betrag (EUR)</label>
          <input class="calc-number" type="number" id="calc-amount" value="${calcAmount}" min="100" step="100" oninput="calcAmount=parseFloat(this.value)||10000;updateCalc()">
        </div>
        <div class="calc-input-group">
          <label>Zeitraum</label>
          <select class="calc-select" id="calc-period" onchange="calcPeriod=this.value;updateCalc()">
            ${PERIODS.map(p=>`<option value="${p.key}"${p.key===calcPeriod?' selected':''}>${p.label}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="calc-cards" id="calc-cards"></div>
      <div class="card" style="background:var(--surface2)"><h3>Normalisierter Kursverlauf (Basis 100)</h3>
        <div class="chart-wrap chart-h320"><canvas id="calc-chart"></canvas></div>
      </div>
    </div>`;
  updateCalc();
}

function getPriceForDate(fund, dateStr){
  const ph=fund.price_history||[];
  const pt=ph.find(p=>p.date===dateStr);
  if(pt)return pt.price;
  // fallback: last price
  return ph.length?ph[ph.length-1].price:null;
}

function getTodayPrice(fund){
  const ph=fund.price_history||[];
  return ph.length?ph[ph.length-1].price:null;
}

function updateCalc(){
  const period=PERIODS.find(p=>p.key===calcPeriod)||PERIODS[0];
  const cards=document.getElementById('calc-cards');
  if(!cards)return;
  const amt=calcAmount||10000;

  cards.innerHTML=FUND_ORDER.map(fid=>{
    const f=DATA.funds[fid];
    const pStart=getPriceForDate(f,period.dateStart);
    const pToday=getTodayPrice(f);
    if(!pStart||!pToday)return'';
    const units=amt/pStart;
    const currVal=units*pToday;
    const gain=currVal-amt;
    const ret=(pToday-pStart)/pStart*100;
    return `<div class="calc-card">
      <div class="calc-card-header">
        <div class="calc-fund-tag" style="background:${f.color}">${f.id}</div>
        <div class="calc-fund-name">${f.name}</div>
      </div>
      <div class="calc-row"><span class="calc-label">Einstiegskurs</span><span class="calc-value">EUR ${fmt(pStart,2)}</span></div>
      <div class="calc-row"><span class="calc-label">Heutiger Kurs</span><span class="calc-value">EUR ${fmt(pToday,2)}</span></div>
      <div class="calc-row"><span class="calc-label">Anteile erworben</span><span class="calc-value">${fmt(units,4)}</span></div>
      <div class="calc-row"><span class="calc-label">Rendite</span><span class="calc-value ${cls(ret)} calc-big">${sign(ret)}${fmt(ret,2)}%</span></div>
      <div class="calc-row"><span class="calc-label">Aktueller Wert</span><span class="calc-value calc-big">EUR ${fmt(currVal,2)}</span></div>
      <div class="calc-row"><span class="calc-label">Gewinn / Verlust</span><span class="calc-value ${cls(gain)}">${sign(gain)}EUR ${fmt(Math.abs(gain),2)}</span></div>
    </div>`;
  }).join('');

  renderCalcChart(period);
}

function renderCalcChart(period){
  const ctx=document.getElementById('calc-chart');
  if(!ctx)return;
  if(calcChartInst){calcChartInst.destroy();calcChartInst=null;}

  // Collect all labels (union of all price_history dates from start date onwards)
  // Use all 4 price_history points but only those >= start date
  const allDatesSet=new Set();
  FUND_ORDER.forEach(fid=>{
    const f=DATA.funds[fid];
    (f.price_history||[]).forEach(pt=>{
      if(pt.date>=period.dateStart)allDatesSet.add(pt.date);
    });
  });
  const allDates=Array.from(allDatesSet).sort();
  // Build labels from date strings using price_history labels
  const labelMap={};
  FUND_ORDER.forEach(fid=>{
    (DATA.funds[fid].price_history||[]).forEach(pt=>{labelMap[pt.date]=pt.label;});
  });
  const labels=allDates.map(d=>labelMap[d]||d);

  const datasets=FUND_ORDER.map(fid=>{
    const f=DATA.funds[fid];
    const ph=f.price_history||[];
    // find base price at start date
    const basePt=ph.find(p=>p.date===period.dateStart)||ph[0];
    const base=basePt?basePt.price:1;
    const data=allDates.map(d=>{
      const pt=ph.find(p=>p.date===d);
      if(pt)return parseFloat(((pt.price/base)*100).toFixed(4));
      return null;
    });
    return {
      label:f.name,
      data,
      borderColor:f.color,
      backgroundColor:'transparent',
      tension:0.3,
      pointRadius:5,
      pointBackgroundColor:f.color,
      pointBorderColor:'#1a1d2e',
      pointBorderWidth:2,
      fill:false,
      borderWidth:2,
      spanGaps:true
    };
  });

  calcChartInst=new Chart(ctx,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#e6edf3',font:{size:12}}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.parsed.y,2)} (Basis 100)`}}
      },
      scales:{
        x:{grid:{color:'#30363d33'},ticks:{color:'#8b949e',font:{size:11}}},
        y:{grid:{color:'#30363d33'},ticks:{color:'#8b949e',font:{size:11},callback:v=>v.toFixed(1)},
          title:{display:true,text:'Normalisiert (Basis 100)',color:'#8b949e',font:{size:11}}}
      }
    }
  });
}

renderHeader();buildTabs();render();
</script>
